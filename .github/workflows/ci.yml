name: CI

# Runs the full quality gate (`npm run verify`) on every push and pull request:
# TypeScript typecheck, ESLint, Vitest, plus cargo fmt/clippy/test across the Rust workspace.
# Linux carries the Tauri system dependencies so the app crate is checked too.
#
# A second job (`mozjpeg-feature`) installs NASM + a C toolchain and clippy/test the engine crate
# with `--features mozjpeg` (the optional trellis-quantized JPEG encoder). It is kept SEPARATE from
# the `verify` job so the main gate stays pure-Rust and needs no C toolchain.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf \
            build-essential \
            file

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        # Pinned to a commit SHA; `toolchain` must be set explicitly because the SHA pin overrides the
        # ref-based toolchain selection this action normally derives from `@stable`.
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify (typecheck, lint, tests, Rust fmt/clippy/test)
        run: npm run verify

  # Builds ONLY the engine crate with the optional mozjpeg encoder. Needs NASM + a C compiler at
  # build time (statically linked into the binary); deliberately does not install the webkit/Tauri
  # system deps because the engine crate has none. The release installers build with this feature.
  mozjpeg-feature:
    name: mozjpeg feature build (engine)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install NASM + C toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm build-essential

      - name: Setup Rust
        # Pinned to a commit SHA; `toolchain` must be set explicitly because the SHA pin overrides the
        # ref-based toolchain selection this action normally derives from `@stable`.
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: './src-tauri -> target'

      - name: Clippy + test the engine with --features mozjpeg
        working-directory: src-tauri
        run: |
          cargo clippy -p engine --all-targets --features mozjpeg -- -D warnings
          cargo test -p engine --features mozjpeg
