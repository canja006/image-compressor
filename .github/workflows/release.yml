name: Release

# Build installers for both desktop platforms from a single version tag. A dedicated job creates
# the draft release first so the matrix build jobs reliably upload to the SAME release (avoiding the
# race where two concurrent jobs each try to create it and one platform's assets get lost).
#
# Push a tag like `v0.3.0` (or run manually) to produce Windows (.msi/.exe) and macOS universal
# (.dmg/.app) artifacts attached to a draft GitHub Release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Create the draft release
        id: create-release
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Image Compressor ${tag}`,
              body: 'Download the installer for your platform from the assets below.',
              draft: true,
              prerelease: false,
            })
            return data.id

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        # Pinned to a commit SHA; `toolchain` must be set explicitly because the SHA pin overrides the
        # ref-based toolchain selection this action normally derives from `@stable`.
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # mozjpeg-sys needs NASM + a C compiler at build time (statically linked into the installer).
      # setup-nasm provides NASM on both Windows and macOS runners.
      - name: Install NASM (for the mozjpeg encoder build)
        uses: ilammy/setup-nasm@72793074d3c8cdda771dba85f6deafe00623038b # v1

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      # A `--target universal-apple-darwin` build needs the externalBin sidecar at TWO phases: the
      # per-arch compile resolves `imgc-<arch>-apple-darwin` (TAURI_ENV_TARGET_TRIPLE = each arch), and
      # the bundle step copies `imgc-universal-apple-darwin`. Stage all three: native per-arch binaries
      # plus a lipo'd universal one. (Windows and local builds stage the single host-triple sidecar via
      # the beforeBuildCommand in tauri.conf.json.)
      - name: Stage imgc sidecar (macOS — per-arch + universal)
        if: matrix.platform == 'macos-latest'
        working-directory: src-tauri
        run: |
          cargo build -p imgc --release --features mozjpeg --target aarch64-apple-darwin
          cargo build -p imgc --release --features mozjpeg --target x86_64-apple-darwin
          mkdir -p binaries
          cp target/aarch64-apple-darwin/release/imgc binaries/imgc-aarch64-apple-darwin
          cp target/x86_64-apple-darwin/release/imgc binaries/imgc-x86_64-apple-darwin
          lipo -create -output binaries/imgc-universal-apple-darwin \
            target/aarch64-apple-darwin/release/imgc \
            target/x86_64-apple-darwin/release/imgc
          file binaries/imgc-*-apple-darwin

      - name: Build the app and upload to the release
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional signing — add these repository secrets to enable them:
          #   macOS:   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
          #            APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
          #   Windows: configure Authenticode via tauri.conf.json bundle.windows
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          # Build the release installers with the trellis-quantized mozjpeg JPEG encoder ON.
          args: ${{ matrix.args }} --features mozjpeg
